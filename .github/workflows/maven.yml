name: springboot cicd github actions flow

on:
  pull_request:
    branches: [ "master" ]
    types: [ closed ]

jobs:
  build:
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    # 1️⃣ Checkout source
    - uses: actions/checkout@v4

    # 2️⃣ Setup Java
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3️⃣ Build Spring Boot JAR
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 4️⃣ Setup Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 6️⃣ Build & Push Docker Image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ vars.DOCKERHUB_USERNAME }}/springboot-cicd-github-actions:latest
          ${{ vars.DOCKERHUB_USERNAME }}/springboot-cicd-github-actions:${{ github.sha }}

    # 7️⃣ Dependency graph (your existing step)
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6